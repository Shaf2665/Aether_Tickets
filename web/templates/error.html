{% extends "base.html" %}

{% block title %}{{ code }} - Aether Tickets{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body py-5">
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                    <h1 class="display-4 fw-bold mt-3">{{ code }}</h1>
                    <p class="lead text-muted">{{ message }}</p>
                    <a href="{{ url_for('dashboard.view') if session.user_id else url_for('auth.login') }}"
                       class="btn btn-primary mt-3">
                        <i class="bi bi-house"></i>
                        {% if session.user_id %}Back to Dashboard{% else %}Go to Login{% endif %}
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
