<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aether Tickets Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .discord-button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .discord-button:hover {
            background: #4752C4;
            color: white;
            text-decoration: none;
        }
        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>
            <i class="bi bi-ticket-perforated"></i> Aether Tickets
        </h1>
        <p>Admin Dashboard</p>

        <a href="{{ url_for('auth.login') }}" class="discord-button">
            <i class="bi bi-discord icon"></i>
            Login with Discord
        </a>

        <hr class="my-4">
        <small class="text-muted d-block text-center">
            Sign in with your Discord account to manage tickets.<br>
            You must be a guild owner or administrator.
        </small>
    </div>
</body>
</html>
